<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evergreen Cemetery Records</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <header>
      <h1>Evergreen Cemetery Records</h1>
      <p>Searchable burial records from the cleaned Evergreen dataset.</p>
    </header>

    <section class="controls">
      <input id="searchBox" type="search" placeholder="Search name, family notes, location..." />

      <div class="filters">
        <input id="yearFrom" type="number" placeholder="Death year from" />
        <input id="yearTo" type="number" placeholder="Death year to" />
        <button id="clearBtn">Clear</button>
      </div>
    </section>

    <section class="summary">
      <span id="count">Loading records...</span>
    </section>

    <section id="results" class="results"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
